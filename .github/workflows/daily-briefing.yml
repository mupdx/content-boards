name: Daily Briefing

on:
  schedule:
    # Jeden Tag um 06:05 UTC = 08:05 MESZ (Sommerzeit)
    - cron: '5 6 * * *'
  workflow_dispatch: # Manuell ausloesbar

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Briefing
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python .github/scripts/daily_briefing.py
